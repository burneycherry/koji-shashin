<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="工事写真帳">
<title>工事写真帳</title>
<style>
:root {
  --green-dark:  #1a3a1a;
  --green-mid:   #1e5c1e;
  --green-board: #2d6e2d;
  --green-light: #3a8a3a;
  --green-pale:  #c8e6c8;
  --board-line:  rgba(255,255,255,0.7);
  --gold:        #d4a843;
  --white:       #ffffff;
  --gray200:     #e2e8f0;
  --gray400:     #94a3b8;
  --gray600:     #475569;
  --text-dark:   #0f172a;
  --radius:      12px;
}
*{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body{
  width:100%; height:100%; overflow:hidden;
  background: var(--green-dark);
  font-family: -apple-system,'Hiragino Sans','Yu Gothic',sans-serif;
  color: var(--white);
  -webkit-text-size-adjust:100%;
}

/* ===== SCREENS ===== */
.screen{
position:fixed; top:0;left:0;right:0;bottom:0;
display:none; flex-direction:column; overflow-y:auto;
-webkit-overflow-scrolling:touch;
}
.screen.active{ display:flex; }

/* ===== HOME ===== */
#homeScreen{ background:var(–green-dark); }

.home-body{
flex:1; padding:14px;
overflow-y:auto; -webkit-overflow-scrolling:touch;
padding-top: calc(env(safe-area-inset-top,44px) + 10px);
padding-bottom: calc(env(safe-area-inset-bottom,0px) + 80px);
}

/* カード */
.card{
background: #1e5c1e;
border: 1.5px solid #4aaa4a;
border-radius: var(–radius);
padding:16px; margin-bottom:12px;
}
.card-title{
font-size:11px; font-weight:800; color:rgba(255,255,255,0.65);
text-transform:uppercase; letter-spacing:1px; margin-bottom:12px;
}

/* 入力フィールド */
.field{ margin-bottom:12px; }
.field:last-child{ margin-bottom:0; }
.field label{
display:flex; align-items:center; gap:6px;
font-size:13px; font-weight:800; color:#ffffff; margin-bottom:6px;
}
.req{ color:#ff8080; font-size:11px; font-weight:700; }
.opt{ color:rgba(255,255,255,0.45); font-size:11px; }
.field input{
width:100%;
background: #0f2a0f;
border: 2px solid #4aaa4a;
border-radius:10px;
padding:12px 14px; font-size:16px;
font-family:inherit; color:#ffffff;
outline:none; -webkit-appearance:none; appearance:none;
}
.field input:focus{ border-color: #FFD700; background:#1a3a1a; }
.field input::placeholder{ color:rgba(255,255,255,0.35); }

/* ステータス */
.status-grid4{ display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:6px; }
.status-opt{
padding:12px 4px; border-radius:10px;
border:2px solid rgba(255,255,255,0.25);
background: #0f2a0f;
font-size:14px; font-weight:800; font-family:inherit;
color:rgba(255,255,255,0.55); cursor:pointer; text-align:center;
}
.status-opt.sel-mae{ border-color:#60a5fa; background:rgba(37,99,235,0.4); color:#ffffff; }
.status-opt.sel-chu{ border-color:#fb923c; background:rgba(234,88,12,0.4); color:#ffffff; }
.status-opt.sel-ato{ border-color:#4ade80; background:rgba(22,163,74,0.4); color:#ffffff; }
.status-opt.sel-free{ border-color:#FFD700; background:rgba(217,168,67,0.3); color:#FFD700; }

/* 連番 */
.seq-row{ display:flex; align-items:center; justify-content:space-between; }
.seq-display{ font-size:42px; font-weight:800; color:#FFD700; letter-spacing:3px; }
.seq-actions{ display:flex; gap:8px; }
.seq-btn{
width:46px; height:46px; border-radius:10px;
border:2px solid #4aaa4a; background:#0f2a0f;
font-size:22px; cursor:pointer; color:#ffffff;
display:flex; align-items:center; justify-content:center;
}
.seq-hint{
margin-top:10px; font-size:12px; color:rgba(255,255,255,0.55);
background:#0f2a0f; border-radius:8px; padding:8px 10px;
line-height:1.6; word-break:break-all; font-family:monospace;
border:1px solid #4aaa4a;
}

/* 撮影ボタン */
.start-btn{
position:fixed; bottom:0; left:0; right:0;
background:#2d6e2d;
border-top:2px solid #4aaa4a;
border-left:none; border-right:none; border-bottom:none;
color:#ffffff;
padding:20px 20px calc(env(safe-area-inset-bottom,0px) + 20px);
font-size:18px; font-weight:800; font-family:inherit;
cursor:pointer; -webkit-appearance:none;
display:flex; align-items:center; justify-content:center; gap:8px;
z-index:10;
text-shadow: 0 1px 3px rgba(0,0,0,0.5);
letter-spacing:0.5px;
}
.start-btn:active{ background:#3a8a3a; }

/* 履歴ボタン */
.hist-fab{
position:fixed;
top: calc(env(safe-area-inset-top,44px) + 10px);
right:14px;
background:#2d6e2d;
border:2px solid #4aaa4a;
border-radius:20px;
color:#ffffff; font-size:13px; font-weight:700; font-family:inherit;
padding:9px 16px; cursor:pointer; z-index:20;
text-shadow: 0 1px 2px rgba(0,0,0,0.4);
}

/* ===== CAMERA ===== */
#cameraScreen{ background:#000; overflow:hidden; }
#videoWrap{
position:fixed; top:0;left:0;right:0;bottom:0;
background:#000; z-index:1;
}
#videoEl{
position:absolute; top:50%; left:50%;
transform:translate(-50%,-50%);
min-width:100%; min-height:100%;
width:auto; height:auto;
object-fit:cover;
}

/* ===== 電子黒板（ドラッグ可能）===== */
#blackboard{
position:fixed;
left:12px; bottom:160px;
z-index:20;
cursor:grab;
touch-action:none;
user-select:none;
}
#blackboard:active{ cursor:grabbing; }

.bb-wrap{
background: #2d6e2d;  /* 透明度なし・確実な緑 */
border: 2px solid rgba(255,255,255,0.85);
border-radius:4px;
width: 270px;         /* 幅を広げる */
overflow:hidden;
box-shadow: 3px 3px 16px rgba(0,0,0,0.75);
}

/* 黒板の各行 */
.bb-row{
display:flex;
border-bottom:1px solid rgba(255,255,255,0.6);
min-height:26px;
}
.bb-row.no-bottom{ border-bottom:none; }

.bb-key{
background: rgba(0,0,0,0.2);
border-right:1px solid rgba(255,255,255,0.6);
padding:5px 6px;
font-size:11px; font-weight:800; color:#ffffff;
min-width:62px; max-width:62px; white-space:nowrap;
display:flex; align-items:center;
text-shadow: 0 1px 2px rgba(0,0,0,0.6);
}
.bb-val-cell{
flex:1; padding:5px 8px;
font-size:11px; color:#ffffff; font-weight:600;
word-break:break-all; line-height:1.5;
text-shadow: 0 1px 2px rgba(0,0,0,0.5);
}

/* 中段スペース（ステータス＋フリー）*/
.bb-mid{
border-bottom:1px solid rgba(255,255,255,0.6);
padding:7px 8px;
min-height:50px;
display:flex; flex-direction:column; gap:5px;
}
.bb-status-badge{
align-self:flex-start;
font-size:11px; font-weight:800; color:#ffffff;
padding:2px 12px; border-radius:10px;
text-shadow: 0 1px 2px rgba(0,0,0,0.4);
}
.bb-free{
font-size:11px; color:#ffffff;
font-weight:600;
line-height:1.5; white-space:pre-wrap;
text-shadow: 0 1px 2px rgba(0,0,0,0.5);
}

/* 撮影日時行 — ラインなし */
.bb-time-row{
display:flex; align-items:center; justify-content:center;
padding:5px 8px;
font-size:11px; font-family:monospace; color:#FFD700;
font-weight:800;
text-shadow: 0 1px 3px rgba(0,0,0,0.7);
background: rgba(0,0,0,0.15);
}

/* カメラUI */
.cam-topbar{
position:fixed; top:0;left:0;right:0; z-index:30;
background:linear-gradient(to bottom,rgba(0,0,0,0.7),transparent);
padding-top:env(safe-area-inset-top,44px);
padding-left:16px; padding-right:16px; padding-bottom:16px;
display:flex; justify-content:space-between; align-items:center;
}
.cam-close{
width:40px; height:40px; border-radius:20px;
background:rgba(0,0,0,0.55); border:none; color:white;
font-size:18px; cursor:pointer;
display:flex; align-items:center; justify-content:center;
}
.cam-seq{ text-align:center; }
.cam-seq-num{ font-size:28px; font-weight:700; color:white; font-family:monospace; }
.cam-seq-label{ font-size:10px; color:rgba(255,255,255,0.6); margin-top:1px; }
.cam-flash{
width:40px; height:40px; border-radius:20px;
background:rgba(0,0,0,0.55); border:none; color:white;
font-size:18px; cursor:pointer;
display:flex; align-items:center; justify-content:center;
}
.cam-bottombar{
position:fixed; bottom:0;left:0;right:0; z-index:30;
background:linear-gradient(to top,rgba(0,0,0,0.8),transparent);
padding-bottom:calc(env(safe-area-inset-bottom,0px) + 20px);
padding-top:20px; padding-left:16px; padding-right:16px;
display:flex; justify-content:space-around; align-items:center;
}
.cam-side-btn{
display:flex; flex-direction:column; align-items:center; gap:4px;
background:none; border:none; color:white; cursor:pointer; min-width:64px;
}
.cam-side-btn span:first-child{ font-size:28px; }
.cam-side-label{ font-size:11px; opacity:.85; font-family:inherit; }

.shutter{
width:76px; height:76px; border-radius:50%;
background:white; border:4px solid rgba(255,255,255,0.5);
display:flex; align-items:center; justify-content:center;
cursor:pointer; -webkit-appearance:none;
}
.shutter:active{ transform:scale(0.93); }
.shutter-inner{
width:62px; height:62px; border-radius:50%;
background:white; border:2px solid #ccc;
}
.shutter.saving{ opacity:0.5; }

/* ===== PREVIEW ===== */
#previewScreen{ background:#000; overflow:hidden; }
.preview-img-wrap{
flex:1; display:flex; align-items:center; justify-content:center;
background:#000; min-height:0;
}
#previewImg{ max-width:100%; max-height:100%; object-fit:contain; }
.preview-footer{
background: #0f2a0f;
border-top:2px solid #4aaa4a;
padding:14px 16px calc(env(safe-area-inset-bottom,0px) + 16px);
flex-shrink:0;
}
.preview-filename{
background:#1e5c1e; border:1.5px solid #4aaa4a;
border-radius:10px; padding:10px 14px; margin-bottom:14px;
}
.preview-filename-label{ font-size:11px; color:rgba(255,255,255,0.65); margin-bottom:4px; font-weight:700; }
.preview-filename-val{ font-family:monospace; font-size:13px; color:#FFD700; word-break:break-all; font-weight:700; }
.save-hint{ font-size:12px; color:#4ade80; text-align:center; margin-bottom:12px; font-weight:700; }
.preview-btns{ display:flex; gap:10px; }
.preview-continue{
flex:1; background:#2d6e2d; color:#ffffff;
border:2px solid #6abf6a;
border-radius:12px; padding:18px; font-size:18px; font-weight:800;
font-family:inherit; cursor:pointer; -webkit-appearance:none;
text-shadow:0 1px 3px rgba(0,0,0,0.5);
letter-spacing:0.3px;
}
.preview-continue:active{ background:#3a8a3a; }
.preview-home{
background:#1e5c1e; color:#ffffff;
border:2px solid #6abf6a;
border-radius:12px; padding:18px 20px; font-size:16px; font-weight:800;
font-family:inherit; cursor:pointer; -webkit-appearance:none;
text-shadow:0 1px 3px rgba(0,0,0,0.4);
}
.preview-home:active{ background:#2d6e2d; }

/* ===== HISTORY ===== */
#historyScreen{ background:var(–green-dark); color:var(–white); }
.hist-header{
background:var(–green-mid);
border-bottom:1px solid var(–green-light);
padding:env(safe-area-inset-top,44px) 16px 14px;
display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
}
.hist-header h2{ color:white; font-size:17px; font-weight:700; }
.hist-back{ background:none; border:none; color:white; font-size:14px; cursor:pointer; font-family:inherit; padding:4px; }
.hist-clear{ background:none; border:none; color:#f87171; font-size:13px; cursor:pointer; font-family:inherit; }
.hist-list{ flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; }
.hist-item{
display:flex; align-items:center; gap:10px;
padding:12px 16px;
background:var(–green-mid);
border-bottom:1px solid var(–green-dark);
}
.hist-dot{ width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.hist-info{ flex:1; min-width:0; }
.hist-fname{ font-size:12px; font-weight:700; font-family:monospace; color:white; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.hist-meta{ font-size:11px; color:rgba(255,255,255,0.45); margin-top:2px; }
.hist-badge{ font-size:10px; font-weight:700; padding:3px 8px; border-radius:10px; color:white; flex-shrink:0; }
.hist-empty{ display:flex; align-items:center; justify-content:center; flex:1; color:rgba(255,255,255,0.3); font-size:15px; }
.hist-del-btn{
background:none; border:1.5px solid #f87171; border-radius:8px;
color:#f87171; font-size:12px; font-weight:700; font-family:inherit;
padding:5px 10px; cursor:pointer; flex-shrink:0;
}
.hist-del-btn:active{ background:rgba(248,113,113,0.2); }
.hist-count{
font-size:12px; color:rgba(255,255,255,0.5);
padding:10px 16px 6px; font-weight:700;
}

/* ===== MISC ===== */
.flash-overlay{ position:fixed; inset:0; background:white; opacity:0; pointer-events:none; z-index:999; transition:opacity 0.06s; }
.flash-overlay.on{ opacity:1; }
.toast{
position:fixed; bottom:120px; left:50%; transform:translateX(-50%);
background:rgba(10,30,10,0.95); border:1px solid var(–green-light);
color:white; padding:12px 20px; border-radius:100px; font-size:13px;
z-index:9999; opacity:0; transition:opacity 0.3s; white-space:nowrap; pointer-events:none;
}
.toast.show{ opacity:1; }
</style>

</head>

<!-- ===== HISTORY ===== -->

<div class="screen" id="historyScreen">
  <div class="hist-header">
    <button class="hist-back" onclick="goHome()">← 戻る</button>
    <h2>撮影履歴</h2>
    <button class="hist-clear" onclick="clearHistory()">🗑 一括削除</button>
  </div>
  <div class="hist-count" id="histCount"></div>
  <div class="hist-list" id="histList"></div>
</div>

<script>
// ===== STATE =====
const S = {
  projectName:'', location:'', workType:'', contractor:'',
  status:'作業前', freeStatusText:'', seq:1,
  showTime: true,
  bbX:12, bbY:-1,
};
const SC = { '作業前':'#2563eb', '作業中':'#ea580c', '作業後':'#16a34a', 'フリー':'#b45309' };
const SS = { '作業前':'sel-mae', '作業中':'sel-chu', '作業後':'sel-ato', 'フリー':'sel-free' };

let stream=null, facing='environment', flashOn=false, clockTimer=null;

// ===== PERSIST =====
function save(){ try{ localStorage.setItem('kjs3',JSON.stringify(S)); }catch(e){} }
function load(){ try{ Object.assign(S,JSON.parse(localStorage.getItem('kjs3')||'{}')); }catch(e){} }
function getHist(){ try{ return JSON.parse(localStorage.getItem('kjs_h')||'[]'); }catch(e){ return []; } }
function addHist(i){
  const h=getHist(); h.unshift(i);
  if(h.length>300) h.pop();
  try{ localStorage.setItem('kjs_h',JSON.stringify(h)); }catch(e){}
}

// ===== UTILS =====
function pad(n,d=3){ return String(n).padStart(d,'0'); }
function clean(s){ return (s||'').trim().replace(/[\\/:*?"<>|\s]/g,'').slice(0,30); }
function buildFname(){
  const p=[];
  if(S.location) p.push(clean(S.location));
  if(S.workType)  p.push(clean(S.workType));
  p.push(S.status); p.push(pad(S.seq));
  return p.join('_')+'.jpg';
}
function nowStr(){
  const d=new Date();
  return `${d.getFullYear()}/${pad(d.getMonth()+1,2)}/${pad(d.getDate(),2)} ${pad(d.getHours(),2)}:${pad(d.getMinutes(),2)}:${pad(d.getSeconds(),2)}`;
}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== HOME UI =====
function refreshHome(){
  document.getElementById('projectName').value = S.projectName||'';
  document.getElementById('location').value    = S.location||'';
  document.getElementById('workType').value    = S.workType||'';
  document.getElementById('contractor').value  = S.contractor||'';
  document.getElementById('seqDisplay').textContent = pad(S.seq);
  refreshHint(); refreshStatusBtns(); refreshTimeToggle();
}
function toggleShowTime(){
  S.showTime = !S.showTime;
  refreshTimeToggle(); save();
}
function refreshTimeToggle(){
  const on = S.showTime;
  // ホームボタン
  const hb = document.getElementById('timeToggleBtn');
  if(hb){
    hb.textContent = on ? 'ON' : 'OFF';
    hb.style.background = on ? 'var(--green-board)' : 'rgba(255,255,255,0.1)';
    hb.style.color = on ? 'white' : 'rgba(255,255,255,0.4)';
  }
  // カメラ内ボタン
  const cb = document.getElementById('camTimeToggle');
  if(cb){
    cb.textContent = on ? '🕐 日時ON' : '🕐 日時OFF';
    cb.style.borderColor = on ? 'rgba(255,220,80,0.6)' : 'rgba(255,255,255,0.3)';
    cb.style.color = on ? '#FFD700' : 'rgba(255,255,255,0.5)';
  }
  // 黒板の日時行
  const bbTime = document.getElementById('bbTime');
  if(bbTime) bbTime.style.display = on ? 'flex' : 'none';
}
function refreshHint(){ document.getElementById('seqHint').textContent=buildFname(); }
function refreshStatusBtns(){
  document.querySelectorAll('.status-opt').forEach(b=>{
    b.className='status-opt';
    if(b.dataset.val===S.status){
      if(S.status==='フリー') b.classList.add('sel-free');
      else b.classList.add(SS[S.status]);
    }
  });
  // フリー入力欄の表示切替
  const wrap=document.getElementById('freeStatusWrap');
  if(wrap) wrap.style.display = S.status==='フリー' ? 'block' : 'none';
  const inp=document.getElementById('freeStatusInput');
  if(inp && S.status==='フリー') inp.value=S.freeStatusText||'';
}
function selectStatus(el){
  S.status=el.dataset.val;
  refreshStatusBtns(); refreshHint(); save();
}
function onFreeStatusInput(val){
  S.freeStatusText=val; save();
  refreshBlackboard();
}
function changeSeq(d){ S.seq=Math.max(1,S.seq+d); document.getElementById('seqDisplay').textContent=pad(S.seq); refreshHint(); save(); }
function resetSeq(){
  if(!confirm('連番を1にリセットしますか？')) return;
  S.seq=1; document.getElementById('seqDisplay').textContent='001'; refreshHint(); save();
}
['projectName','location','workType','contractor'].forEach(id=>{
  document.getElementById(id).addEventListener('input',e=>{ S[id]=e.target.value; refreshHint(); save(); });
});

// ===== フリーテキストモーダル =====

// ===== CAMERA =====
async function startCamera(){
  S.location    = document.getElementById('location').value.trim();
  S.workType    = document.getElementById('workType').value.trim();
  S.projectName = document.getElementById('projectName').value.trim();
  S.contractor  = document.getElementById('contractor').value.trim();
  if(!S.location||!S.workType){ toast('⚠ 施工場所と工種を入力してください'); return; }
  save();
  showScreen('cameraScreen');
  try{
    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:{ideal:facing}, width:{ideal:1920}, height:{ideal:1080} }, audio:false
    });
    const vid=document.getElementById('videoEl');
    vid.srcObject=stream;
    vid.onloadedmetadata=()=>vid.play().catch(()=>{});
    initBBPosition();
    refreshBlackboard();
    startClock();
  }catch(e){
    console.error(e);
    showScreen('homeScreen');
    if(e.name==='NotAllowedError') toast('⚠ カメラ許可が必要です。設定→Safari→カメラを確認');
    else toast('⚠ カメラ起動失敗: '+e.message);
  }
}
function stopCamera(){ stopStream(); stopClock(); showScreen('homeScreen'); }
function stopStream(){
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
  document.getElementById('videoEl').srcObject=null;
}
function startClock(){ stopClock(); clockTimer=setInterval(tickClock,1000); tickClock(); }
function stopClock(){ if(clockTimer){ clearInterval(clockTimer); clockTimer=null; } }
function tickClock(){ document.getElementById('bbTime').textContent=nowStr(); }

function refreshBlackboard(){
  const c=SC[S.status]||'#666';
  const badge=document.getElementById('bbBadge');
  // バッジは常にチョーク白・フリーはフリーワード表示
  if(S.status==='フリー'){
    badge.textContent = S.freeStatusText || 'フリーワード';
  } else {
    badge.textContent = S.status;
  }
  badge.style.background = 'rgba(255,255,255,0.12)';
  badge.style.borderColor = 'rgba(255,255,255,0.7)';
  badge.style.color = '#ffffff';
  badge.style.display = 'inline-block';
  document.getElementById('bbProject').textContent   = S.projectName||'—';
  document.getElementById('bbLocation').textContent  = S.location||'—';
  document.getElementById('bbWorkType').textContent  = S.workType||'—';
  document.getElementById('bbContractor').textContent= S.contractor||'—';
  document.getElementById('bbFree').textContent      = '';  // フリーステータスのテキストはバッジで表示
  document.getElementById('statusLabel').textContent = S.status==='フリー' ? (S.freeStatusText||'フリーワード').slice(0,6) : S.status;
  document.getElementById('camSeqNum').textContent   = pad(S.seq);
  refreshTimeToggle();
}

function cycleStatus(){
  const opts=['作業前','作業中','作業後','フリー'];
  S.status=opts[(opts.indexOf(S.status)+1)%3];
  refreshBlackboard(); save();
}
function toggleFlash(){
  flashOn=!flashOn;
  document.getElementById('flashBtn').textContent=flashOn?'💡':'⚡';
  if(stream){
    const t=stream.getVideoTracks()[0];
    if(t?.getCapabilities?.()?.torch) t.applyConstraints({advanced:[{torch:flashOn}]}).catch(()=>{});
  }
}
async function flipCamera(){
  facing=facing==='environment'?'user':'environment';
  stopStream();
  try{
    stream=await navigator.mediaDevices.getUserMedia({ video:{facingMode:{ideal:facing}}, audio:false });
    const vid=document.getElementById('videoEl');
    vid.srcObject=stream; vid.onloadedmetadata=()=>vid.play().catch(()=>{});
  }catch(e){ toast('カメラ切替失敗'); }
}

// ===== 黒板ドラッグ =====
function initBBPosition(){
  const bb=document.getElementById('blackboard');
  // 初期位置: 左下
  bb.style.left='12px';
  bb.style.bottom='160px';
  bb.style.top='';
}

(function setupBB(){
  const bb = document.getElementById('blackboard');
  let dragging=false, startX=0, startY=0, origLeft=0, origTop=0;
  // ピンチ用
  let pinching=false, startDist=0, startWidth=270;
  // 現在の幅を保持（最小200・最大480）
  let bbWidth = 270;

  function getPos(){
    const r=bb.getBoundingClientRect();
    return { left:r.left, top:r.top };
  }
  function clampPos(left,top){
    return {
      left: Math.max(0, Math.min(window.innerWidth - bb.offsetWidth, left)),
      top:  Math.max(0, Math.min(window.innerHeight - bb.offsetHeight, top))
    };
  }
  function applyWidth(w){
    bbWidth = Math.max(200, Math.min(480, w));
    bb.querySelector('.bb-wrap').style.width = bbWidth+'px';
  }
  function dist(t){ return Math.hypot(t[0].clientX-t[1].clientX, t[0].clientY-t[1].clientY); }

  bb.addEventListener('touchstart',e=>{
    if(e.touches.length===2){
      // ピンチ開始
      pinching=true; dragging=false;
      startDist=dist(e.touches);
      startWidth=bbWidth;
      e.preventDefault();
    } else if(e.touches.length===1 && !pinching){
      // ドラッグ開始
      dragging=true;
      const pos=getPos();
      origLeft=pos.left; origTop=pos.top;
      startX=e.touches[0].clientX; startY=e.touches[0].clientY;
      bb.style.left=origLeft+'px'; bb.style.top=origTop+'px'; bb.style.bottom='auto';
      e.preventDefault();
    }
  },{passive:false});

  bb.addEventListener('touchmove',e=>{
    if(pinching && e.touches.length===2){
      const d=dist(e.touches);
      applyWidth(startWidth * (d/startDist));
      e.preventDefault();
    } else if(dragging && e.touches.length===1){
      const dx=e.touches[0].clientX-startX, dy=e.touches[0].clientY-startY;
      const p=clampPos(origLeft+dx, origTop+dy);
      bb.style.left=p.left+'px'; bb.style.top=p.top+'px';
      e.preventDefault();
    }
  },{passive:false});

  bb.addEventListener('touchend',e=>{
    if(e.touches.length < 2) pinching=false;
    if(e.touches.length === 0) dragging=false;
  });

  // マウス（PC確認用）
  bb.addEventListener('mousedown',e=>{
    dragging=true;
    const pos=getPos();
    origLeft=pos.left; origTop=pos.top;
    startX=e.clientX; startY=e.clientY;
    bb.style.left=origLeft+'px'; bb.style.top=origTop+'px'; bb.style.bottom='auto';
    e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!dragging) return;
    const p=clampPos(origLeft+(e.clientX-startX), origTop+(e.clientY-startY));
    bb.style.left=p.left+'px'; bb.style.top=p.top+'px';
  });
  document.addEventListener('mouseup',()=>{ dragging=false; });

  // ② 縦横回転で黒板位置をクランプ（画面外に出ないよう）
  function onOrientationChange(){
    setTimeout(()=>{
      const r=bb.getBoundingClientRect();
      const p=clampPos(r.left, r.top);
      bb.style.left=p.left+'px'; bb.style.top=p.top+'px'; bb.style.bottom='auto';
    }, 300);
  }
  window.addEventListener('orientationchange', onOrientationChange);
  window.addEventListener('resize', onOrientationChange);
})();

// ===== CAPTURE =====
async function capture(){
  const btn=document.getElementById('shutterBtn');
  if(btn.classList.contains('saving')) return;
  btn.classList.add('saving');
  const fl=document.getElementById('flashOverlay');
  fl.classList.add('on'); setTimeout(()=>fl.classList.remove('on'),120);

  try{
    const vid=document.getElementById('videoEl');
    const w=vid.videoWidth||1280, h=vid.videoHeight||720;
    const canvas=document.createElement('canvas');
    canvas.width=w; canvas.height=h;
    const ctx=canvas.getContext('2d');
    ctx.drawImage(vid,0,0,w,h);
    drawBBOnCanvas(ctx,w,h);

    const dataUrl=canvas.toDataURL('image/jpeg',0.92);
    const fname=buildFname();

    addHist({ fileName:fname, location:S.location, workType:S.workType, status:S.status, seq:S.seq, capturedAt:new Date().toISOString() });
    S.seq++; save(); refreshBlackboard();

    document.getElementById('previewImg').src=dataUrl;
    document.getElementById('previewFname').textContent=fname;
    stopClock();
    showScreen('previewScreen');
  }catch(e){
    console.error(e); toast('撮影に失敗しました');
  }finally{
    btn.classList.remove('saving');
  }
}

function drawBBOnCanvas(ctx,cw,ch){
  const bb=document.getElementById('blackboard');
  const bbR=bb.getBoundingClientRect();
  const vR=document.getElementById('videoWrap').getBoundingClientRect();
  const sx=cw/vR.width, sy=ch/vR.height;
  const bx=(bbR.left-vR.left)*sx, by=(bbR.top-vR.top)*sy;
  const bw=bbR.width*sx, bh=bbR.height*sy;

  ctx.save();

  // ★ 背景を完全な不透明緑で塗る（透明バグ修正）
  ctx.globalAlpha=1.0;
  ctx.fillStyle='#2d6e2d';
  rrect(ctx,bx,by,bw,bh,4*sx); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.85)'; ctx.lineWidth=2*sx;
  rrect(ctx,bx,by,bw,bh,4*sx); ctx.stroke();

  const fs=Math.max(13,13*sx);
  const lh=Math.max(26,26*sy);
  const kw=66*sx, p=8*sx;

  ctx.textBaseline='middle';
  ctx.shadowColor='rgba(0,0,0,0.6)'; ctx.shadowBlur=2;

  const rows=[
    ['工事件名', S.projectName||'—'],
    ['工事場所', S.location||'—'],
    ['工　　種', S.workType||'—'],
  ];

  let y=by;

  rows.forEach(([k,v])=>{
    ctx.fillStyle='rgba(0,0,0,0.22)';
    ctx.fillRect(bx,y,kw,lh);
    ctx.strokeStyle='rgba(255,255,255,0.65)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(bx,y+lh); ctx.lineTo(bx+bw,y+lh); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx+kw,y); ctx.lineTo(bx+kw,y+lh); ctx.stroke();

    ctx.font=`800 ${fs}px -apple-system,sans-serif`;
    ctx.fillStyle='#ffffff';
    ctx.fillText(k, bx+4*sx, y+lh/2);

    ctx.font=`600 ${fs}px -apple-system,sans-serif`;
    ctx.fillStyle='#ffffff';
    fitText(ctx, v, bx+kw+p, y+lh/2, bw-kw-p*2);
    y+=lh;
  });

  // 中段
  const midH=Math.max(54,56*sy);
  ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(255,255,255,0.65)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(bx,y+midH); ctx.lineTo(bx+bw,y+midH); ctx.stroke();

  ctx.font=`800 ${fs*0.9}px -apple-system,sans-serif`;
  const badgeTxt=S.status==='フリー'?(S.freeStatusText||'フリーワード'):S.status;
  const bm=ctx.measureText(badgeTxt);
  const bdgW=bm.width+16*sx, bdgH=20*sy;
  // チョーク白バッジ（半透明白背景＋白枠）
  ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.shadowBlur=0;
  rrect(ctx,bx+p,y+5*sy,bdgW,bdgH,10*sx); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.75)'; ctx.lineWidth=1.5;
  rrect(ctx,bx+p,y+5*sy,bdgW,bdgH,10*sx); ctx.stroke();
  ctx.fillStyle='#ffffff'; ctx.shadowColor='rgba(0,0,0,0.6)'; ctx.shadowBlur=2;
  ctx.fillText(badgeTxt, bx+p+8*sx, y+5*sy+bdgH/2);

  // フリーステータスのテキストはバッジで表示済みのため中段テキスト描画なし
  y+=midH;

  // 施工業者
  ctx.fillStyle='rgba(0,0,0,0.22)';
  ctx.fillRect(bx,y,kw,lh);
  ctx.strokeStyle='rgba(255,255,255,0.65)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(bx+kw,y); ctx.lineTo(bx+kw,y+lh); ctx.stroke();
  ctx.font=`800 ${fs}px -apple-system,sans-serif`;
  ctx.fillStyle='#ffffff'; ctx.textBaseline='middle';
  ctx.fillText('施 工 者', bx+4*sx, y+lh/2);
  ctx.font=`600 ${fs}px -apple-system,sans-serif`;
  fitText(ctx, S.contractor||'—', bx+kw+p, y+lh/2, bw-kw-p*2);
  y+=lh;

  // 日時
  if(S.showTime){
    ctx.fillStyle='rgba(0,0,0,0.2)';
    ctx.fillRect(bx,y,bw,lh*0.9);
    ctx.font=`800 ${fs*0.95}px monospace`;
    ctx.fillStyle='#FFD700'; ctx.textAlign='center';
    ctx.shadowColor='rgba(0,0,0,0.8)'; ctx.shadowBlur=3;
    ctx.fillText(nowStr(), bx+bw/2, y+lh*0.45);
    ctx.textAlign='left';
  }

  ctx.shadowBlur=0;
  ctx.restore();
}

// 長いテキストをフォント縮小して1行に収める
function fitText(ctx,text,x,y,maxW){
  if(!text) return;
  const orig=ctx.font;
  if(ctx.measureText(text).width>maxW){
    const fsm=orig.match(/([\d.]+)px/);
    if(fsm){
      const scale=maxW/ctx.measureText(text).width*0.95;
      ctx.font=orig.replace(/([\d.]+)px/, (parseFloat(fsm[1])*scale).toFixed(1)+'px');
    }
  }
  ctx.fillText(text,x,y);
  ctx.font=orig;
}

function rrect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

// ===== PREVIEW =====
function continueCapture(){
  showScreen('cameraScreen');
  if(stream){
    const vid=document.getElementById('videoEl');
    vid.srcObject=stream; vid.play().catch(()=>{});
  } else { startCamera(); return; }
  refreshBlackboard(); startClock();
}
function goHome(){ stopStream(); stopClock(); showScreen('homeScreen'); refreshHome(); }

// ===== HISTORY =====
function showHistory(){
  const h=getHist();
  const list=document.getElementById('histList');
  const count=document.getElementById('histCount');
  if(!h.length){
    if(count) count.textContent='';
    list.innerHTML='<div class="hist-empty">📷 まだ撮影履歴がありません</div>';
  } else {
    if(count) count.textContent=`${h.length}件`;
    list.innerHTML=h.map((item,idx)=>{
      const c=SC[item.status]||'#666';
      const dt=new Date(item.capturedAt).toLocaleString('ja-JP');
      const label=item.status==='フリー'?(item.freeStatusText||'フリー'):item.status;
      return `<div class="hist-item" id="hist-item-${idx}">
        <div class="hist-dot" style="background:${c}"></div>
        <div class="hist-info">
          <div class="hist-fname">${item.fileName}</div>
          <div class="hist-meta">${item.location} / ${item.workType} — ${dt}</div>
        </div>
        <div class="hist-badge" style="background:${c};margin-right:6px">${label}</div>
        <button class="hist-del-btn" onclick="deleteHistItem(${idx})">削除</button>
      </div>`;
    }).join('');
  }
  showScreen('historyScreen');
}
function deleteHistItem(idx){
  const h=getHist();
  const item=h[idx];
  if(!confirm(`この履歴を削除しますか？\n\n📁 ${item.fileName}`)) return;
  h.splice(idx,1);
  try{ localStorage.setItem('kjs_h',JSON.stringify(h)); }catch(e){}
  showHistory();
}
function clearHistory(){
  const h=getHist();
  if(!h.length){ alert('削除する履歴がありません。'); return; }
  if(!confirm(`撮影履歴を全${h.length}件まとめて削除しますか？\nこの操作は元に戻せません。`)) return;
  localStorage.removeItem('kjs_h');
  showHistory();
}

// ===== INIT =====
load(); refreshHome();
</script>

</body>
</html>
