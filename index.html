<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="工事写真帳">
<title>工事写真帳</title>
<style>
:root {
  --navy: #0d2137;
  --navy2: #1a3a5c;
  --blue: #2563eb;
  --blue-light: #dbeafe;
  --green: #16a34a;
  --green-light: #dcfce7;
  --orange: #ea580c;
  --orange-light: #ffedd5;
  --gray50: #f8fafc;
  --gray100: #f1f5f9;
  --gray200: #e2e8f0;
  --gray400: #94a3b8;
  --gray600: #475569;
  --text: #0f172a;
  --radius: 14px;
}

- { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
width: 100%; height: 100%;
overflow: hidden;
background: #0d2137;
font-family: -apple-system, ‘Hiragino Sans’, ‘Yu Gothic’, sans-serif;
color: white;
-webkit-text-size-adjust: 100%;
}

/* ======== SCREENS ======== */
.screen {
position: fixed;
top: 0; left: 0; right: 0; bottom: 0;
display: none;
flex-direction: column;
overflow-y: auto;
-webkit-overflow-scrolling: touch;
}
.screen.active { display: flex; }

/* ======== HOME ======== */
#homeScreen {
background: var(–gray50);
color: var(–text);
}

.home-header {
background: var(–navy2);
padding: env(safe-area-inset-top, 44px) 20px 18px;
display: flex;
align-items: center;
justify-content: space-between;
flex-shrink: 0;
}
.home-header h1 { font-size: 20px; font-weight: 700; color: white; }
.home-header p  { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 2px; }
.history-btn-header {
background: rgba(255,255,255,0.15);
border: none; color: white;
font-size: 13px; font-family: inherit;
padding: 8px 14px; border-radius: 20px; cursor: pointer;
}

.home-body {
flex: 1; padding: 14px;
overflow-y: auto; -webkit-overflow-scrolling: touch;
padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 14px);
}

.card {
background: white; border-radius: var(–radius);
padding: 16px; margin-bottom: 12px;
box-shadow: 0 1px 6px rgba(0,0,0,0.08);
}
.card-title {
font-size: 11px; font-weight: 700; color: var(–gray400);
text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px;
}

.field { margin-bottom: 12px; }
.field:last-child { margin-bottom: 0; }
.field label {
display: flex; align-items: center; gap: 6px;
font-size: 12px; font-weight: 700; color: var(–gray600); margin-bottom: 6px;
}
.req { color: #ef4444; font-size: 10px; }
.opt { color: var(–gray400); font-size: 10px; }

.field input {
width: 100%;
border: 1.5px solid var(–gray200); border-radius: 10px;
padding: 12px 14px; font-size: 16px;
font-family: inherit; color: var(–text);
background: var(–gray50); outline: none;
-webkit-appearance: none; appearance: none;
}
.field input:focus { border-color: var(–blue); background: white; }
.field input::placeholder { color: var(–gray400); }

.status-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.status-opt {
padding: 11px 4px; border-radius: 10px;
border: 2px solid var(–gray200); background: white;
font-size: 14px; font-weight: 700; font-family: inherit;
color: var(–gray600); cursor: pointer; text-align: center;
}
.status-opt.sel-mae  { border-color: var(–blue);   background: var(–blue-light);   color: var(–blue); }
.status-opt.sel-chu  { border-color: var(–orange);  background: var(–orange-light); color: var(–orange); }
.status-opt.sel-ato  { border-color: var(–green);   background: var(–green-light);  color: var(–green); }

.seq-row { display: flex; align-items: center; justify-content: space-between; }
.seq-display { font-size: 38px; font-weight: 700; color: var(–navy2); letter-spacing: 2px; }
.seq-actions { display: flex; gap: 8px; }
.seq-btn {
width: 42px; height: 42px; border-radius: 10px;
border: 1.5px solid var(–gray200); background: white;
font-size: 20px; cursor: pointer;
display: flex; align-items: center; justify-content: center;
}
.seq-hint {
margin-top: 10px; font-size: 12px; color: var(–gray400);
background: var(–gray50); border-radius: 8px; padding: 8px 10px;
line-height: 1.6; word-break: break-all; font-family: monospace;
}

.start-btn {
width: 100%; background: var(–navy2); color: white;
border: none; border-radius: var(–radius);
padding: 18px; font-size: 17px; font-weight: 700; font-family: inherit;
cursor: pointer; margin-bottom: 10px;
box-shadow: 0 4px 16px rgba(26,58,92,0.4);
display: flex; align-items: center; justify-content: center; gap: 8px;
-webkit-appearance: none;
}
.start-btn:active { opacity: 0.85; }

/* ======== CAMERA ======== */
#cameraScreen {
background: #000;
overflow: hidden;
}

#videoWrap {
position: fixed;
top: 0; left: 0; right: 0; bottom: 0;
background: #000;
z-index: 1;
}

#videoEl {
position: absolute;
top: 50%; left: 50%;
transform: translate(-50%, -50%);
min-width: 100%; min-height: 100%;
width: auto; height: auto;
object-fit: cover;
-webkit-playsinline: true;
}

/* 電子黒板 */
.blackboard {
position: fixed;
bottom: 160px; left: 10px;
background: rgba(10, 30, 10, 0.88);
border: 2px solid #8B6914;
border-radius: 8px;
padding: 10px 12px;
min-width: 200px; max-width: 65vw;
z-index: 10;
}
.bb-header {
display: flex; justify-content: space-between; align-items: center;
margin-bottom: 6px; padding-bottom: 5px;
border-bottom: 1px solid rgba(139,105,20,0.5);
}
.bb-title { color: white; font-size: 12px; font-weight: 700; letter-spacing: 0.5px; }
.bb-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px; color: white; }
.bb-row { display: flex; gap: 6px; margin-bottom: 4px; }
.bb-row:last-child { margin-bottom: 0; }
.bb-label { color: #7ec8e3; font-size: 10px; min-width: 50px; flex-shrink: 0; }
.bb-val   { color: white; font-size: 10px; font-weight: 500; flex: 1; }
.bb-time  { color: #FFD700; font-size: 10px; font-weight: 700; font-family: monospace; }

/* カメラ上部バー */
.cam-topbar {
position: fixed; top: 0; left: 0; right: 0; z-index: 20;
background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
padding-top: env(safe-area-inset-top, 44px);
padding-left: 16px; padding-right: 16px; padding-bottom: 16px;
display: flex; justify-content: space-between; align-items: center;
}
.cam-close {
width: 40px; height: 40px; border-radius: 20px;
background: rgba(0,0,0,0.55); border: none; color: white;
font-size: 18px; cursor: pointer;
display: flex; align-items: center; justify-content: center;
}
.cam-seq { text-align: center; }
.cam-seq-num { font-size: 28px; font-weight: 700; color: white; font-family: monospace; }
.cam-seq-label { font-size: 10px; color: rgba(255,255,255,0.6); margin-top: 1px; }
.cam-flash {
width: 40px; height: 40px; border-radius: 20px;
background: rgba(0,0,0,0.55); border: none; color: white;
font-size: 18px; cursor: pointer;
display: flex; align-items: center; justify-content: center;
}

/* カメラ下部バー */
.cam-bottombar {
position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
padding-top: 20px; padding-left: 16px; padding-right: 16px;
display: flex; justify-content: space-around; align-items: center;
}
.cam-side-btn {
display: flex; flex-direction: column; align-items: center; gap: 4px;
background: none; border: none; color: white; cursor: pointer; min-width: 64px;
}
.cam-side-btn span:first-child { font-size: 28px; }
.cam-side-label { font-size: 11px; opacity: 0.85; font-family: inherit; }

.shutter {
width: 76px; height: 76px; border-radius: 50%;
background: white; border: 4px solid rgba(255,255,255,0.5);
display: flex; align-items: center; justify-content: center;
cursor: pointer; -webkit-appearance: none;
}
.shutter:active { transform: scale(0.93); }
.shutter-inner {
width: 62px; height: 62px; border-radius: 50%;
background: white; border: 2px solid #ccc;
}
.shutter.saving { opacity: 0.5; }

/* ======== PREVIEW ======== */
#previewScreen { background: #000; overflow: hidden; }
.preview-img-wrap {
flex: 1; display: flex; align-items: center; justify-content: center;
background: #000; min-height: 0;
}
#previewImg { max-width: 100%; max-height: 100%; object-fit: contain; }
.preview-footer {
background: #111;
padding: 14px 16px calc(env(safe-area-inset-bottom, 0px) + 16px);
flex-shrink: 0;
}
.preview-filename {
background: #1a1a1a; border-radius: 10px; padding: 10px 14px; margin-bottom: 14px;
}
.preview-filename-label { font-size: 10px; color: var(–gray400); margin-bottom: 4px; }
.preview-filename-val  { font-family: monospace; font-size: 12px; color: #FFD700; word-break: break-all; }
.save-hint { font-size: 11px; color: #4ade80; text-align: center; margin-bottom: 12px; }
.preview-btns { display: flex; gap: 10px; }
.preview-continue {
flex: 1; background: var(–navy2); color: white; border: none;
border-radius: 12px; padding: 15px; font-size: 15px; font-weight: 700;
font-family: inherit; cursor: pointer; -webkit-appearance: none;
}
.preview-home {
background: #222; color: var(–gray400); border: none;
border-radius: 12px; padding: 15px 16px; font-size: 13px;
font-family: inherit; cursor: pointer; -webkit-appearance: none;
}

/* ======== HISTORY ======== */
#historyScreen { background: var(–gray50); color: var(–text); }
.hist-header {
background: var(–navy2);
padding: env(safe-area-inset-top, 44px) 16px 14px;
display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.hist-header h2 { color: white; font-size: 17px; font-weight: 700; }
.hist-back  { background: none; border: none; color: white; font-size: 14px; cursor: pointer; font-family: inherit; padding: 4px; }
.hist-clear { background: none; border: none; color: #f87171; font-size: 13px; cursor: pointer; font-family: inherit; }
.hist-list  { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.hist-item  { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: white; border-bottom: 1px solid var(–gray100); }
.hist-dot   { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.hist-info  { flex: 1; min-width: 0; }
.hist-fname { font-size: 12px; font-weight: 700; font-family: monospace; color: var(–text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hist-meta  { font-size: 11px; color: var(–gray400); margin-top: 2px; }
.hist-badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 10px; color: white; flex-shrink: 0; }
.hist-empty { display: flex; align-items: center; justify-content: center; flex: 1; color: var(–gray400); font-size: 15px; }

/* ======== TOAST / FLASH ======== */
.flash-overlay { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 999; transition: opacity 0.06s; }
.flash-overlay.on { opacity: 1; }
.toast {
position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%);
background: rgba(15,23,42,0.92); color: white; padding: 12px 20px;
border-radius: 100px; font-size: 13px; z-index: 9999;
opacity: 0; transition: opacity 0.3s; white-space: nowrap; pointer-events: none;
}
.toast.show { opacity: 1; }
</style>

</head>

<script>
// ======== STATE ========
const S = {
  projectName: '', location: '', workType: '', contractor: '',
  status: '作業前', seq: 1,
};
const STATUS_COLORS = { '作業前':'#2563eb', '作業中':'#ea580c', '作業後':'#16a34a' };
const STATUS_SEL    = { '作業前':'sel-mae', '作業中':'sel-chu', '作業後':'sel-ato' };

let stream = null, facing = 'environment', flashOn = false, clockTimer = null;

// ======== PERSIST ========
function save() { try { localStorage.setItem('kjs2', JSON.stringify(S)); } catch(e){} }
function load() { try { Object.assign(S, JSON.parse(localStorage.getItem('kjs2')||'{}')); } catch(e){} }
function getHist() { try { return JSON.parse(localStorage.getItem('kjs_h')||'[]'); } catch(e){ return []; } }
function addHist(i) {
  const h = getHist(); h.unshift(i);
  if (h.length>300) h.pop();
  try { localStorage.setItem('kjs_h', JSON.stringify(h)); } catch(e){}
}

// ======== UTILS ========
function pad(n,d=3){ return String(n).padStart(d,'0'); }
function clean(s){ return (s||'').trim().replace(/[\\/:*?"<>|\s]/g,'').slice(0,30); }
function buildFname(){
  const p=[];
  if(S.location) p.push(clean(S.location));
  if(S.workType)  p.push(clean(S.workType));
  p.push(S.status); p.push(pad(S.seq));
  return p.join('_')+'.jpg';
}
function nowStr(){
  const d=new Date();
  return `${d.getFullYear()}/${pad(d.getMonth()+1,2)}/${pad(d.getDate(),2)} ${pad(d.getHours(),2)}:${pad(d.getMinutes(),2)}:${pad(d.getSeconds(),2)}`;
}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ======== HOME UI ========
function refreshHome(){
  document.getElementById('projectName').value = S.projectName||'';
  document.getElementById('location').value    = S.location||'';
  document.getElementById('workType').value    = S.workType||'';
  document.getElementById('contractor').value  = S.contractor||'';
  document.getElementById('seqDisplay').textContent = pad(S.seq);
  refreshHint();
  refreshStatusBtns();
}
function refreshHint(){ document.getElementById('seqHint').textContent = buildFname(); }
function refreshStatusBtns(){
  document.querySelectorAll('.status-opt').forEach(b=>{
    b.className='status-opt';
    if(b.dataset.val===S.status) b.classList.add(STATUS_SEL[S.status]);
  });
}
function selectStatus(el){
  S.status=el.dataset.val; refreshStatusBtns(); refreshHint(); save();
}
function changeSeq(d){
  S.seq=Math.max(1,S.seq+d);
  document.getElementById('seqDisplay').textContent=pad(S.seq);
  refreshHint(); save();
}
function resetSeq(){
  if(!confirm('連番を1にリセットしますか？')) return;
  S.seq=1;
  document.getElementById('seqDisplay').textContent='001';
  refreshHint(); save();
}
['projectName','location','workType','contractor'].forEach(id=>{
  document.getElementById(id).addEventListener('input', e=>{
    S[id]=e.target.value; refreshHint(); save();
  });
});

// ======== CAMERA ========
async function startCamera(){
  S.location    = document.getElementById('location').value.trim();
  S.workType    = document.getElementById('workType').value.trim();
  S.projectName = document.getElementById('projectName').value.trim();
  S.contractor  = document.getElementById('contractor').value.trim();
  if(!S.location||!S.workType){ toast('⚠ 施工場所と工種を入力してください'); return; }
  save();

  showScreen('cameraScreen');

  try {
    const constraints = {
      video: {
        facingMode: { ideal: facing },
        width:  { ideal: 1920 },
        height: { ideal: 1080 },
      },
      audio: false
    };
    stream = await navigator.mediaDevices.getUserMedia(constraints);

    const vid = document.getElementById('videoEl');
    vid.srcObject = stream;

    // iOS Safari requires explicit play() call
    vid.onloadedmetadata = () => {
      vid.play().catch(e => console.warn('play error:', e));
    };

    refreshBlackboard();
    startClock();
  } catch(e) {
    console.error('Camera error:', e);
    showScreen('homeScreen');
    if(e.name==='NotAllowedError'){
      toast('⚠ カメラの許可が必要です。設定→Safari→カメラを確認してください');
    } else {
      toast('⚠ カメラを起動できませんでした: '+e.message);
    }
  }
}

function stopCamera(){
  stopStream(); stopClock();
  showScreen('homeScreen');
}
function stopStream(){
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
  document.getElementById('videoEl').srcObject = null;
}

function startClock(){ stopClock(); clockTimer=setInterval(tickClock,1000); tickClock(); }
function stopClock(){ if(clockTimer){ clearInterval(clockTimer); clockTimer=null; } }
function tickClock(){ document.getElementById('bbTime').textContent=nowStr(); }

function refreshBlackboard(){
  const c=STATUS_COLORS[S.status]||'#666';
  const badge=document.getElementById('bbBadge');
  badge.textContent=S.status; badge.style.background=c;

  document.getElementById('bbProject').textContent   = S.projectName||'';
  document.getElementById('bbLocation').textContent  = S.location||'—';
  document.getElementById('bbWorkType').textContent  = S.workType||'—';
  document.getElementById('bbContractor').textContent= S.contractor||'';
  document.getElementById('bbProjectRow').style.display    = S.projectName ? 'flex':'none';
  document.getElementById('bbContractorRow').style.display = S.contractor  ? 'flex':'none';
  document.getElementById('statusLabel').textContent = S.status;
  document.getElementById('camSeqNum').textContent   = pad(S.seq);
}

function cycleStatus(){
  const opts=['作業前','作業中','作業後'];
  S.status=opts[(opts.indexOf(S.status)+1)%3];
  refreshBlackboard(); save();
}

function toggleFlash(){
  flashOn=!flashOn;
  document.getElementById('flashBtn').textContent=flashOn?'💡':'⚡';
  if(stream){
    const t=stream.getVideoTracks()[0];
    if(t?.getCapabilities?.()?.torch){
      t.applyConstraints({advanced:[{torch:flashOn}]}).catch(()=>{});
    }
  }
}

async function flipCamera(){
  facing = facing==='environment'?'user':'environment';
  stopStream();
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: facing } }, audio: false
    });
    const vid=document.getElementById('videoEl');
    vid.srcObject=stream;
    vid.onloadedmetadata=()=>vid.play().catch(()=>{});
  } catch(e){ toast('カメラ切替に失敗しました'); }
}

// ======== CAPTURE ========
async function capture(){
  const btn=document.getElementById('shutterBtn');
  if(btn.classList.contains('saving')) return;
  btn.classList.add('saving');

  const fl=document.getElementById('flashOverlay');
  fl.classList.add('on');
  setTimeout(()=>fl.classList.remove('on'),120);

  try {
    const vid=document.getElementById('videoEl');
    const w=vid.videoWidth||1280, h=vid.videoHeight||720;
    const canvas=document.createElement('canvas');
    canvas.width=w; canvas.height=h;
    const ctx=canvas.getContext('2d');

    // ビデオフレーム描画
    ctx.drawImage(vid,0,0,w,h);

    // 黒板を重ね描き
    drawBB(ctx,w,h);

    const dataUrl=canvas.toDataURL('image/jpeg',0.92);
    const fname=buildFname();

    addHist({ fileName:fname, location:S.location, workType:S.workType, status:S.status, seq:S.seq, capturedAt:new Date().toISOString() });

    S.seq++; save();
    refreshBlackboard();

    document.getElementById('previewImg').src=dataUrl;
    document.getElementById('previewFname').textContent=fname;
    stopClock();
    showScreen('previewScreen');
  } catch(e){
    console.error(e);
    toast('撮影に失敗しました');
  } finally {
    btn.classList.remove('saving');
  }
}

function drawBB(ctx,cw,ch){
  const bb=document.getElementById('blackboard');
  const bbR=bb.getBoundingClientRect();
  const vidR=document.getElementById('videoWrap').getBoundingClientRect();

  const sx=cw/vidR.width, sy=ch/vidR.height;
  const bx=(bbR.left-vidR.left)*sx, by=(bbR.top-vidR.top)*sy;
  const bw=bbR.width*sx, bh=bbR.height*sy;
  const pad=10*sx, fs=11*sx, lh=18*sy;

  ctx.save();
  ctx.fillStyle='rgba(10,30,10,0.88)';
  rrect(ctx,bx,by,bw,bh,8*sx); ctx.fill();
  ctx.strokeStyle='#8B6914'; ctx.lineWidth=2*sx;
  rrect(ctx,bx,by,bw,bh,8*sx); ctx.stroke();

  ctx.font=`700 ${fs}px -apple-system,sans-serif`;
  ctx.textBaseline='top';
  let y=by+pad;

  // タイトル
  ctx.fillStyle='white'; ctx.fillText('📋 工事写真',bx+pad,y);
  // バッジ
  const bc=STATUS_COLORS[S.status]||'#666';
  const bt=S.status, bm=ctx.measureText(bt);
  const bw2=bm.width+14*sx, bh2=16*sy, bx2=bx+bw-pad-bw2;
  ctx.fillStyle=bc; rrect(ctx,bx2,y,bw2,bh2,8*sx); ctx.fill();
  ctx.font=`700 ${fs*0.9}px -apple-system,sans-serif`;
  ctx.fillStyle='white'; ctx.fillText(bt,bx2+7*sx,y+2*sy);

  y+=lh+4*sy;
  ctx.strokeStyle='rgba(139,105,20,0.5)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(bx+pad,y); ctx.lineTo(bx+bw-pad,y); ctx.stroke();
  y+=6*sy;

  ctx.font=`500 ${fs}px -apple-system,sans-serif`;
  const rows=[];
  if(S.projectName) rows.push(['工事名',S.projectName]);
  rows.push(['施工場所',S.location||'—']);
  rows.push(['工種',S.workType||'—']);
  if(S.contractor) rows.push(['施工業者',S.contractor]);
  rows.push(['撮影日時',nowStr()]);

  rows.forEach(([l,v],i)=>{
    ctx.fillStyle='#7ec8e3'; ctx.fillText(l,bx+pad,y);
    ctx.fillStyle=(i===rows.length-1)?'#FFD700':'white';
    ctx.fillText(v,bx+pad+56*sx,y);
    y+=lh;
  });
  ctx.restore();
}

function rrect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

// ======== PREVIEW ========
function continueCapture(){
  showScreen('cameraScreen');
  const vid=document.getElementById('videoEl');
  if(stream){ vid.srcObject=stream; vid.play().catch(()=>{}); }
  else { startCamera(); return; }
  refreshBlackboard(); startClock();
}
function goHome(){ stopStream(); stopClock(); showScreen('homeScreen'); refreshHome(); }

// ======== HISTORY ========
function showHistory(){
  const h=getHist();
  const list=document.getElementById('histList');
  if(!h.length){
    list.innerHTML='<div class="hist-empty">📷 まだ撮影履歴がありません</div>';
  } else {
    list.innerHTML=h.map(item=>{
      const c=STATUS_COLORS[item.status]||'#999';
      const dt=new Date(item.capturedAt).toLocaleString('ja-JP');
      return `<div class="hist-item">
        <div class="hist-dot" style="background:${c}"></div>
        <div class="hist-info">
          <div class="hist-fname">${item.fileName}</div>
          <div class="hist-meta">${item.location} / ${item.workType} — ${dt}</div>
        </div>
        <div class="hist-badge" style="background:${c}">${item.status}</div>
      </div>`;
    }).join('');
  }
  showScreen('historyScreen');
}
function clearHistory(){
  if(!confirm('撮影履歴をすべて削除しますか？')) return;
  localStorage.removeItem('kjs_h'); showHistory();
}

// ======== NAV ========
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ======== INIT ========
load(); refreshHome();
</script>
